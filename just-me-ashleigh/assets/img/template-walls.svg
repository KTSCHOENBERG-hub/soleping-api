<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1000" font-family="Inter, sans-serif">
  <g font-family="Inter" font-size="9" fill="#4F6D7A">
    <text x="40" y="22" font-size="14" fill="#2C4654" font-weight="600" letter-spacing="2">TEMPLATE — EXTERIOR WALLS (PRINT AT 100%)</text>
    <text x="40" y="36" letter-spacing="1.5">SHEET 1 OF 6  ·  PRINT ON 11×17 OR TILE A4 ·  CALIBRATION SCALE BELOW</text>
    <text x="680" y="22" text-anchor="end" font-size="10" fill="#D88C7A" letter-spacing="2">SHEET T-1.0</text>
  </g>

  <!-- calibration ruler -->
  <g stroke="#1A2832" stroke-width="0.8">
    <line x1="40" y1="50" x2="184" y2="50"/>
    <line x1="40" y1="46" x2="40" y2="54"/>
    <line x1="184" y1="46" x2="184" y2="54"/>
    <line x1="76" y1="48" x2="76" y2="52"/>
    <line x1="112" y1="48" x2="112" y2="52"/>
    <line x1="148" y1="48" x2="148" y2="52"/>
  </g>
  <text x="40" y="68" font-size="7" fill="#D88C7A" letter-spacing="1">CALIBRATION: this should measure 6.0" (152mm) — adjust scale if not</text>

  <!-- wall A — front exterior -->
  <g transform="translate(40 90)">
    <text x="0" y="-4" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">PIECE A · FRONT EXTERIOR WALL  ·  CUT 1  ·  3/16" FOAM BOARD</text>
    <rect x="0" y="0" width="560" height="160" fill="#FDFCFA" stroke="#1A2832" stroke-width="1.2"/>
    <!-- window cutouts -->
    <g fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2">
      <rect x="60" y="40" width="36" height="48"/>
      <rect x="125" y="40" width="36" height="48"/>
      <rect x="200" y="40" width="36" height="48"/>
      <rect x="265" y="40" width="36" height="48"/>
      <rect x="340" y="40" width="36" height="48"/>
      <rect x="405" y="40" width="36" height="48"/>
      <rect x="470" y="40" width="36" height="48"/>
    </g>
    <!-- door cutout -->
    <rect x="248" y="100" width="50" height="60" fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2"/>
    <text x="273" y="135" text-anchor="middle" font-size="6" fill="#D88C7A">DOOR</text>
    <!-- score lines -->
    <line x1="0" y1="92" x2="560" y2="92" stroke="#4F6D7A" stroke-width="0.4" stroke-dasharray="2,3"/>
    <text x="565" y="94" font-size="6" fill="#4F6D7A">SCORE (do not cut)</text>
    <!-- siding score lines -->
    <g stroke="#D7DEDC" stroke-width="0.3">
      <line x1="0" y1="20" x2="560" y2="20"/><line x1="0" y1="32" x2="560" y2="32"/>
      <line x1="0" y1="44" x2="560" y2="44"/><line x1="0" y1="56" x2="560" y2="56"/>
      <line x1="0" y1="68" x2="560" y2="68"/><line x1="0" y1="80" x2="560" y2="80"/>
      <line x1="0" y1="104" x2="560" y2="104"/><line x1="0" y1="116" x2="560" y2="116"/>
      <line x1="0" y1="128" x2="560" y2="128"/><line x1="0" y1="140" x2="560" y2="140"/>
      <line x1="0" y1="152" x2="560" y2="152"/>
    </g>
    <text x="2" y="158" font-size="6" fill="#4F6D7A" font-style="italic">light clapboard score lines · 12mm spacing</text>
    <!-- dimensions -->
    <g stroke="#4F6D7A" stroke-width="0.3" fill="#4F6D7A" font-size="7" font-family="Inter">
      <line x1="0" y1="170" x2="560" y2="170"/>
      <text x="280" y="180" text-anchor="middle">9-1/2" (241mm)</text>
      <line x1="-15" y1="0" x2="-15" y2="160"/>
      <text x="-20" y="80" text-anchor="middle" transform="rotate(-90 -20 80)">2-3/4"</text>
    </g>
  </g>

  <!-- wall B — back exterior -->
  <g transform="translate(40 320)">
    <text x="0" y="-4" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">PIECE B · REAR EXTERIOR WALL · CUT 1 · 3/16" FOAM BOARD</text>
    <rect x="0" y="0" width="560" height="160" fill="#FDFCFA" stroke="#1A2832" stroke-width="1.2"/>
    <g fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2">
      <!-- 3 big windows upper -->
      <rect x="150" y="20" width="60" height="60"/>
      <rect x="250" y="20" width="60" height="60"/>
      <rect x="350" y="20" width="60" height="60"/>
      <!-- 3 french doors lower -->
      <rect x="155" y="98" width="50" height="62"/>
      <rect x="255" y="98" width="50" height="62"/>
      <rect x="355" y="98" width="50" height="62"/>
    </g>
    <line x1="0" y1="92" x2="560" y2="92" stroke="#4F6D7A" stroke-width="0.4" stroke-dasharray="2,3"/>
    <g stroke="#D7DEDC" stroke-width="0.3">
      <line x1="0" y1="20" x2="560" y2="20"/><line x1="0" y1="32" x2="560" y2="32"/>
      <line x1="0" y1="44" x2="560" y2="44"/><line x1="0" y1="56" x2="560" y2="56"/>
      <line x1="0" y1="68" x2="560" y2="68"/><line x1="0" y1="80" x2="560" y2="80"/>
      <line x1="0" y1="104" x2="560" y2="104"/><line x1="0" y1="116" x2="560" y2="116"/>
      <line x1="0" y1="128" x2="560" y2="128"/><line x1="0" y1="140" x2="560" y2="140"/>
      <line x1="0" y1="152" x2="560" y2="152"/>
    </g>
  </g>

  <!-- wall C, D — sides -->
  <g transform="translate(40 540)">
    <text x="0" y="-4" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">PIECE C/D · SIDE WALL · CUT 2 (MIRROR) · 3/16" FOAM BOARD</text>
    <polygon points="0,80 0,200 280,200 280,80 140,0" fill="#FDFCFA" stroke="#1A2832" stroke-width="1.2"/>
    <g fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2">
      <rect x="30" y="100" width="28" height="36"/>
      <rect x="80" y="100" width="28" height="36"/>
      <rect x="170" y="100" width="28" height="36"/>
      <rect x="220" y="100" width="28" height="36"/>
      <rect x="30" y="150" width="28" height="36"/>
      <rect x="220" y="150" width="28" height="36"/>
      <circle cx="140" cy="50" r="14"/>
    </g>
    <g stroke="#D7DEDC" stroke-width="0.3">
      <line x1="0" y1="90" x2="280" y2="90"/><line x1="0" y1="105" x2="280" y2="105"/>
      <line x1="0" y1="125" x2="280" y2="125"/><line x1="0" y1="145" x2="280" y2="145"/>
      <line x1="0" y1="165" x2="280" y2="165"/><line x1="0" y1="185" x2="280" y2="185"/>
    </g>
    <text x="140" y="50" font-size="6" fill="#D88C7A" text-anchor="middle">⌀ window</text>
  </g>

  <!-- interior bearing wall -->
  <g transform="translate(360 540)">
    <text x="0" y="-4" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">PIECE E · INTERIOR BEARING WALL · CUT 1 · 1/8" FOAM</text>
    <rect x="0" y="20" width="240" height="160" fill="#F4EFE6" stroke="#1A2832" stroke-width="1.2"/>
    <!-- door openings -->
    <rect x="40" y="100" width="40" height="80" fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2"/>
    <rect x="150" y="100" width="40" height="80" fill="none" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2"/>
    <text x="60" y="145" font-size="6" fill="#D88C7A" text-anchor="middle">DOOR</text>
    <text x="170" y="145" font-size="6" fill="#D88C7A" text-anchor="middle">DOOR</text>
    <!-- stair opening -->
    <rect x="95" y="20" width="50" height="40" fill="none" stroke="#9BBFB1" stroke-width="0.7" stroke-dasharray="3,2"/>
    <text x="120" y="44" font-size="6" fill="#4F6D7A" text-anchor="middle">STAIR · cut full</text>
  </g>

  <!-- legend -->
  <g transform="translate(40 800)">
    <text x="0" y="0" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">LEGEND</text>
    <g font-size="8" fill="#4F6D7A">
      <line x1="0" y1="14" x2="20" y2="14" stroke="#1A2832" stroke-width="1.2"/>
      <text x="26" y="16">cut line (use #11 blade, multiple light passes)</text>

      <line x1="0" y1="28" x2="20" y2="28" stroke="#D88C7A" stroke-width="0.7" stroke-dasharray="3,2"/>
      <text x="26" y="30">cut opening — windows, doors, stair</text>

      <line x1="0" y1="42" x2="20" y2="42" stroke="#4F6D7A" stroke-width="0.4" stroke-dasharray="2,3"/>
      <text x="26" y="44">score line — score back of board, do not cut through</text>

      <line x1="0" y1="56" x2="20" y2="56" stroke="#D7DEDC" stroke-width="0.3"/>
      <text x="26" y="58">light score for clapboard texture (very gentle pressure)</text>
    </g>

    <text x="0" y="80" font-size="9" font-weight="600" fill="#2C4654" letter-spacing="1.5">PRO TIP</text>
    <text x="0" y="94" font-size="8" fill="#4F6D7A" font-style="italic">Always cut on a self-healing mat with a fresh blade. Score then snap rather than cutting through in one pass — your edges stay clean and your fingers stay attached.</text>
  </g>

  <text x="690" y="990" text-anchor="end" font-family="Caveat" font-size="14" fill="#D88C7A" opacity="0.8">— just me, ashleigh</text>
</svg>
