<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Inter, sans-serif">
  <defs>
    <pattern id="pBoard" x="0" y="0" width="18" height="8" patternUnits="userSpaceOnUse">
      <rect width="18" height="8" fill="#F4EFE6"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#D7DEDC" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- sloped ceiling line -->
  <polygon points="60,60 660,60 660,140 60,200" fill="#FDFCFA"/>
  <polygon points="60,200 660,140 660,400 60,400" fill="url(#pBoard)"/>
  <!-- floor -->
  <rect x="60" y="400" width="600" height="40" fill="#BFA98C"/>
  <g stroke="#8B7355" stroke-width="0.4">
    <line x1="60" y1="414" x2="660" y2="414"/><line x1="60" y1="426" x2="660" y2="426"/>
  </g>

  <!-- big window with ocean view (left) -->
  <rect x="100" y="230" width="160" height="150" fill="#9BBFB1" stroke="#FDFCFA" stroke-width="2"/>
  <!-- ocean horizon -->
  <line x1="100" y1="305" x2="260" y2="305" stroke="#FDFCFA" stroke-width="0.6"/>
  <g stroke="#FDFCFA" stroke-width="0.4" opacity="0.6">
    <path d="M100 320 Q 120 318 140 320 T 180 320 T 220 320 T 260 320"/>
    <path d="M100 340 Q 120 338 140 340 T 180 340 T 220 340 T 260 340"/>
  </g>
  <!-- mullions -->
  <g stroke="#FDFCFA" stroke-width="1.2">
    <line x1="180" y1="230" x2="180" y2="380"/>
    <line x1="100" y1="280" x2="260" y2="280"/>
    <line x1="100" y1="330" x2="260" y2="330"/>
  </g>
  <rect x="92" y="222" width="176" height="8" fill="#FDFCFA"/>
  <rect x="92" y="380" width="176" height="8" fill="#FDFCFA"/>

  <!-- KING BED -->
  <!-- upholstered headboard (deep marine) -->
  <rect x="320" y="240" width="280" height="120" fill="#2C4654" stroke="#1A2832" stroke-width="0.5" rx="6"/>
  <g stroke="#FDFCFA" stroke-width="0.4" opacity="0.4">
    <line x1="340" y1="240" x2="340" y2="360"/><line x1="380" y1="240" x2="380" y2="360"/>
    <line x1="420" y1="240" x2="420" y2="360"/><line x1="460" y1="240" x2="460" y2="360"/>
    <line x1="500" y1="240" x2="500" y2="360"/><line x1="540" y1="240" x2="540" y2="360"/>
    <line x1="580" y1="240" x2="580" y2="360"/>
  </g>
  <!-- mattress -->
  <rect x="310" y="345" width="300" height="50" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.6"/>
  <!-- duvet -->
  <rect x="310" y="355" width="300" height="40" fill="#F4EFE6" stroke="#BFA98C" stroke-width="0.3"/>
  <!-- pillows -->
  <rect x="335" y="330" width="80" height="30" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.4" rx="3"/>
  <rect x="425" y="330" width="80" height="30" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.4" rx="3"/>
  <rect x="515" y="330" width="80" height="30" fill="#9BBFB1" stroke="#1A2832" stroke-width="0.4" rx="3"/>
  <!-- throw -->
  <rect x="340" y="380" width="240" height="15" fill="#E8C9B8" opacity="0.7"/>

  <!-- nightstand left -->
  <rect x="280" y="370" width="30" height="30" fill="#BFA98C" stroke="#1A2832" stroke-width="0.5"/>
  <circle cx="295" cy="385" r="1.5" fill="#D88C7A"/>
  <!-- nightstand right -->
  <rect x="610" y="370" width="30" height="30" fill="#BFA98C" stroke="#1A2832" stroke-width="0.5"/>
  <circle cx="625" cy="385" r="1.5" fill="#D88C7A"/>

  <!-- table lamps -->
  <g fill="#FDFCFA" stroke="#1A2832" stroke-width="0.4">
    <path d="M285 360 L295 340 L305 360 Z"/>
    <path d="M615 360 L625 340 L635 360 Z"/>
    <rect x="293" y="362" width="4" height="10"/>
    <rect x="623" y="362" width="4" height="10"/>
  </g>

  <!-- art over bed -->
  <rect x="380" y="100" width="160" height="120" fill="#9BBFB1" stroke="#BFA98C" stroke-width="3"/>
  <!-- abstract beach scene -->
  <path d="M380 180 Q 460 170 540 180 L 540 220 L 380 220 Z" fill="#E8DCC4"/>
  <line x1="380" y1="170" x2="540" y2="170" stroke="#FDFCFA" stroke-width="0.5"/>
  <text x="460" y="248" text-anchor="middle" font-size="7" fill="#4F6D7A" font-style="italic">commissioned art</text>

  <!-- pendant -->
  <line x1="460" y1="60" x2="460" y2="105" stroke="#1A2832" stroke-width="0.4"/>
  <ellipse cx="460" cy="80" rx="14" ry="6" fill="none" stroke="#BFA98C" stroke-width="0.6"/>

  <!-- area rug -->
  <rect x="280" y="395" width="360" height="5" fill="#9BBFB1" opacity="0.5"/>
  <line x1="280" y1="395" x2="640" y2="395" stroke="#BFA98C" stroke-width="0.3" stroke-dasharray="3,2"/>

  <!-- caption -->
  <text x="40" y="468" font-family="Cormorant Garamond" font-size="13" font-style="italic" fill="#4F6D7A">the primary suite — sloped board-and-batten ceiling, deep marine upholstered headboard, ocean view to the west</text>
</svg>
