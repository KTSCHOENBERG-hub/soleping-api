<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="Inter, sans-serif">
  <defs>
    <pattern id="axoShingle" x="0" y="0" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#BFA98C"/>
      <path d="M0 4 L3 0 L6 4" fill="none" stroke="#8B7355" stroke-width="0.3"/>
    </pattern>
    <pattern id="axoSiding" x="0" y="0" width="16" height="4" patternUnits="userSpaceOnUse">
      <rect width="16" height="4" fill="#FDFCFA"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#D7DEDC" stroke-width="0.3"/>
    </pattern>
    <linearGradient id="axoGround" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E8DCC4"/>
      <stop offset="100%" stop-color="#D9C9A8"/>
    </linearGradient>
  </defs>

  <g font-family="Inter" font-size="9" fill="#4F6D7A">
    <text x="40" y="22" font-size="14" fill="#2C4654" font-weight="600" letter-spacing="2">AXONOMETRIC PROJECTION — FINISHED MODEL</text>
    <text x="40" y="36" letter-spacing="1.5">VIEW LOOKING NE  ·  ALL ASSEMBLED COMPONENTS VISIBLE</text>
    <text x="680" y="22" text-anchor="end" font-size="10" fill="#D88C7A" letter-spacing="2">SHEET A-4.0</text>
  </g>

  <!-- ground/site -->
  <polygon points="100,500 350,580 700,470 460,395" fill="url(#axoGround)" stroke="#BFA98C" stroke-width="0.5"/>

  <!-- shadows -->
  <polygon points="200,470 460,545 590,510 320,440" fill="#1A2832" opacity="0.18"/>

  <!-- BACK WALL (left face) -->
  <polygon points="220,250 220,460 380,510 380,300" fill="url(#axoSiding)" stroke="#BFA98C" stroke-width="0.5"/>
  <!-- big window on back wall -->
  <polygon points="248,310 248,400 290,410 290,318" fill="#9BBFB1" stroke="#FDFCFA" stroke-width="1"/>
  <polygon points="305,322 305,415 348,425 348,330" fill="#9BBFB1" stroke="#FDFCFA" stroke-width="1"/>

  <!-- FRONT WALL (right face) -->
  <polygon points="380,300 540,250 540,440 380,510" fill="url(#axoSiding)" stroke="#BFA98C" stroke-width="0.5"/>
  <!-- door -->
  <polygon points="440,322 470,313 470,400 440,415" fill="#2C4654" stroke="#FDFCFA" stroke-width="0.8"/>
  <!-- transom -->
  <polygon points="440,316 470,307 470,322 440,330" fill="#9BBFB1" stroke="#FDFCFA" stroke-width="0.5"/>
  <!-- windows -->
  <polygon points="395,335 425,326 425,395 395,408" fill="#4F6D7A" stroke="#FDFCFA" stroke-width="0.8"/>
  <polygon points="490,318 520,309 520,378 490,391" fill="#4F6D7A" stroke="#FDFCFA" stroke-width="0.8"/>

  <!-- ROOF (left side of gable) -->
  <polygon points="220,250 380,300 460,210 300,160" fill="url(#axoShingle)" stroke="#8B7355" stroke-width="0.5"/>
  <!-- ROOF (right side) -->
  <polygon points="380,300 540,250 620,160 460,210" fill="url(#axoShingle)" stroke="#8B7355" stroke-width="0.5"/>
  <!-- ridge -->
  <line x1="300" y1="160" x2="620" y2="160" stroke="#8B7355" stroke-width="1.2"/>

  <!-- WIDOW'S WALK -->
  <polygon points="420,170 510,140 510,158 420,188" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.5"/>
  <g stroke="#1A2832" stroke-width="0.3">
    <line x1="420" y1="170" x2="420" y2="188"/><line x1="440" y1="163" x2="440" y2="183"/>
    <line x1="460" y1="156" x2="460" y2="178"/><line x1="480" y1="150" x2="480" y2="173"/>
    <line x1="500" y1="143" x2="500" y2="168"/><line x1="510" y1="140" x2="510" y2="166"/>
  </g>

  <!-- chimney -->
  <polygon points="555,180 580,170 580,230 555,240" fill="#FDFCFA" stroke="#8B7355" stroke-width="0.5"/>

  <!-- LEFT WING -->
  <polygon points="160,330 160,480 220,500 220,350" fill="url(#axoSiding)" stroke="#BFA98C" stroke-width="0.5"/>
  <polygon points="160,330 220,350 250,300 190,280" fill="url(#axoShingle)" stroke="#8B7355" stroke-width="0.5"/>

  <!-- SCREENED PORCH (right wing, lower) -->
  <polygon points="540,300 600,290 600,420 540,440" fill="#D7DEDC" opacity="0.65" stroke="#1A2832" stroke-width="0.5"/>
  <polygon points="540,300 600,290 640,235 580,225" fill="url(#axoShingle)" stroke="#8B7355" stroke-width="0.5"/>
  <!-- screen lines -->
  <g stroke="#9BBFB1" stroke-width="0.4">
    <line x1="555" y1="305" x2="555" y2="430"/><line x1="570" y1="300" x2="570" y2="425"/>
    <line x1="585" y1="295" x2="585" y2="420"/>
  </g>

  <!-- BACK DECK -->
  <polygon points="220,470 380,520 380,540 220,490" fill="#BFA98C" stroke="#8B7355" stroke-width="0.5"/>
  <g stroke="#8B7355" stroke-width="0.3">
    <line x1="240" y1="476" x2="240" y2="496"/>
    <line x1="265" y1="484" x2="265" y2="504"/>
    <line x1="290" y1="492" x2="290" y2="512"/>
    <line x1="315" y1="500" x2="315" y2="520"/>
    <line x1="340" y1="508" x2="340" y2="528"/>
    <line x1="365" y1="516" x2="365" y2="536"/>
  </g>

  <!-- FRONT PORCH wraparound -->
  <polygon points="380,510 540,440 600,460 440,540" fill="#E8DCC4" stroke="#BFA98C" stroke-width="0.5"/>
  <!-- porch posts -->
  <g fill="#FDFCFA" stroke="#1A2832" stroke-width="0.5">
    <polygon points="392,496 397,494 397,520 392,522"/>
    <polygon points="438,475 443,473 443,500 438,502"/>
    <polygon points="486,455 491,453 491,480 486,482"/>
    <polygon points="534,438 539,436 539,462 534,464"/>
  </g>

  <!-- landscaping -->
  <g fill="#9BBFB1" opacity="0.85">
    <ellipse cx="190" cy="510" rx="14" ry="6"/>
    <ellipse cx="600" cy="480" rx="14" ry="6"/>
    <ellipse cx="420" cy="540" rx="10" ry="4"/>
    <ellipse cx="465" cy="530" rx="10" ry="4"/>
  </g>

  <!-- callout leader lines -->
  <g stroke="#D88C7A" stroke-width="0.5" fill="none">
    <line x1="460" y1="175" x2="640" y2="120"/>
    <line x1="430" y1="370" x2="640" y2="370"/>
    <line x1="570" y1="370" x2="680" y2="430"/>
    <line x1="280" y1="370" x2="80" y2="320"/>
    <line x1="195" y1="430" x2="80" y2="460"/>
  </g>
  <g font-size="8" fill="#4F6D7A" font-family="Cormorant Garamond" font-style="italic">
    <text x="645" y="118">widow's walk</text>
    <text x="645" y="370">signature blue dutch door</text>
    <text x="685" y="432" text-anchor="end">screened porch</text>
    <text x="78" y="318" text-anchor="end">3-over-3 mudroom window</text>
    <text x="78" y="462" text-anchor="end">hydrangea border</text>
  </g>

  <!-- key dimensions -->
  <g font-size="7" fill="#4F6D7A" font-family="Inter" letter-spacing="0.5">
    <text x="500" y="595">FINISHED MODEL FOOTPRINT (incl. porches): 11.5" × 8.5"  ·  TALLEST POINT: 7.25"</text>
  </g>

  <text x="690" y="585" text-anchor="end" font-family="Caveat" font-size="14" fill="#D88C7A" opacity="0.8">— just me, ashleigh</text>
</svg>
