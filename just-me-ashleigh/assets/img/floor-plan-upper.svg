<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="Inter, sans-serif">
  <defs>
    <pattern id="wallHatch2" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1A2832" stroke-width="0.8"/>
    </pattern>
    <pattern id="tile2" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#D7DEDC"/>
      <path d="M0 0 H8 M0 8 H8 M0 0 V8 M8 0 V8" stroke="#9BBFB1" stroke-width="0.2"/>
    </pattern>
    <pattern id="rugStripe" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#F4EFE6"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="#9BBFB1" stroke-width="0.5"/>
    </pattern>
  </defs>

  <g font-family="Inter" font-size="9" fill="#4F6D7A">
    <text x="40" y="22" font-size="14" fill="#2C4654" font-weight="600" letter-spacing="2">UPPER LEVEL — FLOOR PLAN</text>
    <text x="40" y="36" letter-spacing="1.5">SCALE 1:48 (1/4" = 1'-0")  ·  NORTH ↑  ·  3 BEDROOMS, 2 BATHS, OVERLOOK</text>
    <text x="680" y="22" text-anchor="end" font-size="10" fill="#D88C7A" letter-spacing="2">SHEET A-1.1</text>
  </g>

  <g transform="translate(660 70)">
    <circle r="18" fill="none" stroke="#4F6D7A" stroke-width="0.6"/>
    <polygon points="0,-14 4,8 0,4 -4,8" fill="#2C4654"/>
    <text y="-22" text-anchor="middle" font-size="9" fill="#4F6D7A" font-weight="600">N</text>
  </g>

  <!-- Roof eave footprint hint -->
  <rect x="56" y="76" width="588" height="408" fill="none" stroke="#BFA98C" stroke-width="0.3" stroke-dasharray="2,3"/>
  <text x="640" y="92" text-anchor="end" font-size="7" fill="#BFA98C" font-style="italic">roof eave overhang</text>

  <!-- Exterior walls -->
  <rect x="60" y="80" width="580" height="6" fill="url(#wallHatch2)"/>
  <rect x="60" y="400" width="580" height="6" fill="url(#wallHatch2)"/>
  <rect x="60" y="80" width="6" height="326" fill="url(#wallHatch2)"/>
  <rect x="634" y="80" width="6" height="326" fill="url(#wallHatch2)"/>

  <!-- WIDOW'S WALK platform (above central roof) shown as inset -->
  <rect x="280" y="80" width="160" height="60" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="360" y="105" text-anchor="middle" font-size="9" fill="#4F6D7A" font-style="italic" font-family="Cormorant Garamond">widow's walk</text>
  <text x="360" y="118" text-anchor="middle" font-size="7" fill="#4F6D7A">access via ladder hatch · 60 sf</text>

  <!-- Stair landing -->
  <rect x="66" y="144" width="120" height="84" fill="#F4EFE6"/>
  <g stroke="#1A2832" stroke-width="0.7" fill="none">
    <rect x="80" y="150" width="40" height="72" fill="#F4EFE6"/>
    <line x1="80" y1="158" x2="120" y2="158"/><line x1="80" y1="166" x2="120" y2="166"/>
    <line x1="80" y1="174" x2="120" y2="174"/><line x1="80" y1="182" x2="120" y2="182"/>
    <line x1="80" y1="190" x2="120" y2="190"/><line x1="80" y1="198" x2="120" y2="198"/>
    <line x1="80" y1="206" x2="120" y2="206"/><line x1="80" y1="214" x2="120" y2="214"/>
    <polygon points="100,218 96,212 104,212" fill="#D88C7A"/>
  </g>
  <text x="100" y="232" text-anchor="middle" font-size="7" fill="#4F6D7A" letter-spacing="1">DN 14R</text>
  <text x="160" y="180" text-anchor="middle" font-size="9" fill="#4F6D7A" font-style="italic" font-family="Cormorant Garamond">landing</text>

  <!-- HALLWAY / OVERLOOK -->
  <rect x="186" y="144" width="270" height="34" fill="#E8DCC4" opacity="0.6"/>
  <text x="320" y="166" text-anchor="middle" font-size="9" fill="#4F6D7A" font-style="italic" font-family="Cormorant Garamond">overlook to great room below</text>

  <!-- Interior walls -->
  <rect x="186" y="144" width="4" height="262" fill="#1A2832"/>
  <rect x="456" y="144" width="4" height="262" fill="#1A2832"/>
  <rect x="186" y="178" width="270" height="4" fill="#1A2832"/>
  <rect x="186" y="290" width="270" height="4" fill="#1A2832"/>
  <rect x="320" y="182" width="4" height="108" fill="#1A2832"/>

  <!-- BEDROOM 2 (front center) -->
  <rect x="190" y="294" width="130" height="110" fill="#F4EFE6"/>
  <text x="255" y="328" text-anchor="middle" font-family="Cormorant Garamond" font-size="13" fill="#2C4654" font-weight="500">BEDROOM 2</text>
  <text x="255" y="340" text-anchor="middle" font-size="8" fill="#4F6D7A" letter-spacing="1">12'-0" × 11'-0"</text>
  <!-- bed (queen) -->
  <rect x="222" y="352" width="60" height="44" rx="2" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.7"/>
  <rect x="222" y="352" width="60" height="12" rx="2" fill="#9BBFB1" stroke="#1A2832" stroke-width="0.4"/>
  <!-- nightstands -->
  <rect x="210" y="356" width="10" height="14" fill="#BFA98C" stroke="#1A2832" stroke-width="0.4"/>
  <rect x="284" y="356" width="10" height="14" fill="#BFA98C" stroke="#1A2832" stroke-width="0.4"/>

  <!-- BEDROOM 3 — BUNK ROOM -->
  <rect x="324" y="294" width="132" height="110" fill="#F4EFE6"/>
  <text x="390" y="328" text-anchor="middle" font-family="Cormorant Garamond" font-size="13" fill="#2C4654" font-weight="500">BUNK ROOM</text>
  <text x="390" y="340" text-anchor="middle" font-size="8" fill="#4F6D7A" letter-spacing="1">12'-0" × 11'-0" · sleeps 4</text>
  <!-- bunk bed -->
  <rect x="332" y="352" width="40" height="44" rx="2" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.7"/>
  <line x1="332" y1="374" x2="372" y2="374" stroke="#1A2832" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="352" y="368" text-anchor="middle" font-size="6" fill="#4F6D7A">upper</text>
  <text x="352" y="389" text-anchor="middle" font-size="6" fill="#4F6D7A">lower</text>
  <!-- second bunk -->
  <rect x="408" y="352" width="40" height="44" rx="2" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.7"/>
  <line x1="408" y1="374" x2="448" y2="374" stroke="#1A2832" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="428" y="368" text-anchor="middle" font-size="6" fill="#4F6D7A">upper</text>
  <text x="428" y="389" text-anchor="middle" font-size="6" fill="#4F6D7A">lower</text>
  <!-- reading lights -->
  <circle cx="338" cy="358" r="1.4" fill="#D88C7A"/><circle cx="338" cy="380" r="1.4" fill="#D88C7A"/>
  <circle cx="442" cy="358" r="1.4" fill="#D88C7A"/><circle cx="442" cy="380" r="1.4" fill="#D88C7A"/>

  <!-- SHARED BATH -->
  <rect x="190" y="182" width="180" height="108" fill="url(#tile2)" opacity="0.55"/>
  <text x="280" y="218" text-anchor="middle" font-family="Cormorant Garamond" font-size="13" fill="#2C4654" font-weight="500">SHARED BATH</text>
  <text x="280" y="230" text-anchor="middle" font-size="8" fill="#4F6D7A" letter-spacing="1">8'-0" × 11'-0"</text>
  <!-- tub -->
  <rect x="196" y="244" width="60" height="34" rx="3" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.7"/>
  <text x="226" y="266" text-anchor="middle" font-size="7" fill="#4F6D7A">CLAW TUB</text>
  <!-- double vanity -->
  <rect x="266" y="244" width="92" height="14" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.7"/>
  <circle cx="288" cy="251" r="2" fill="none" stroke="#4F6D7A" stroke-width="0.4"/>
  <circle cx="336" cy="251" r="2" fill="none" stroke="#4F6D7A" stroke-width="0.4"/>
  <!-- toilet -->
  <ellipse cx="288" cy="276" rx="6" ry="4" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.6"/>

  <!-- Closet between bath & bunk -->
  <rect x="324" y="182" width="132" height="22" fill="#F4EFE6" stroke="#1A2832" stroke-width="0.6"/>
  <text x="390" y="197" text-anchor="middle" font-size="8" fill="#4F6D7A" font-style="italic" font-family="Cormorant Garamond">linen + bunk storage</text>

  <!-- PRIMARY SUITE (right side, generous footprint) -->
  <rect x="460" y="84" width="174" height="320" fill="#FDFCFA"/>
  <text x="547" y="118" text-anchor="middle" font-family="Cormorant Garamond" font-size="15" fill="#2C4654" font-weight="500">PRIMARY SUITE</text>
  <text x="547" y="130" text-anchor="middle" font-size="8" fill="#4F6D7A" letter-spacing="1.5">14'-0" × 16'-0" + bath/WIC</text>

  <!-- king bed centered on south wall -->
  <rect x="500" y="334" width="94" height="56" rx="2" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.8"/>
  <rect x="500" y="334" width="94" height="14" rx="2" fill="#2C4654" stroke="#1A2832" stroke-width="0.4"/>
  <text x="547" y="370" text-anchor="middle" font-size="7" fill="#4F6D7A">KING</text>
  <rect x="484" y="338" width="14" height="20" fill="#BFA98C" stroke="#1A2832" stroke-width="0.4"/>
  <rect x="596" y="338" width="14" height="20" fill="#BFA98C" stroke="#1A2832" stroke-width="0.4"/>

  <!-- area rug -->
  <rect x="476" y="320" width="142" height="80" fill="url(#rugStripe)" opacity="0.6"/>
  <!-- reading nook chair -->
  <circle cx="610" cy="200" r="14" fill="#E8C9B8" stroke="#1A2832" stroke-width="0.6"/>
  <text x="600" y="225" font-size="6" fill="#4F6D7A">reading nook</text>

  <!-- Primary bath partition -->
  <rect x="460" y="200" width="120" height="4" fill="#1A2832"/>
  <rect x="578" y="200" width="4" height="120" fill="#1A2832"/>

  <!-- PRIMARY BATH -->
  <rect x="464" y="142" width="116" height="58" fill="url(#tile2)" opacity="0.55"/>
  <text x="522" y="170" text-anchor="middle" font-family="Cormorant Garamond" font-size="12" fill="#2C4654" font-weight="500">PRIMARY BATH</text>
  <!-- soaking tub (oval) -->
  <ellipse cx="490" cy="186" rx="18" ry="10" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.6"/>
  <!-- walk-in shower -->
  <rect x="520" y="176" width="26" height="22" fill="url(#tile2)" stroke="#1A2832" stroke-width="0.5"/>
  <line x1="546" y1="176" x2="546" y2="198" stroke="#9BBFB1" stroke-width="0.8"/>
  <!-- toilet & vanity -->
  <ellipse cx="566" cy="170" rx="5" ry="3.5" fill="#FDFCFA" stroke="#1A2832" stroke-width="0.4"/>

  <!-- WIC -->
  <rect x="582" y="142" width="52" height="58" fill="#F4EFE6"/>
  <text x="608" y="170" text-anchor="middle" font-family="Cormorant Garamond" font-size="11" fill="#2C4654" font-weight="500">WIC</text>
  <text x="608" y="182" text-anchor="middle" font-size="7" fill="#4F6D7A">walk-in closet</text>
  <!-- hanging rods -->
  <line x1="586" y1="148" x2="586" y2="196" stroke="#BFA98C" stroke-width="0.8"/>
  <line x1="630" y1="148" x2="630" y2="196" stroke="#BFA98C" stroke-width="0.8"/>

  <!-- Door swings -->
  <g fill="none" stroke="#4F6D7A" stroke-width="0.5">
    <path d="M186 200 L208 200 A22 22 0 0 1 186 222 Z"/>
    <path d="M186 270 L208 270 A22 22 0 0 0 186 248 Z"/>
    <path d="M280 178 L280 200 A22 22 0 0 1 258 178 Z"/>
    <path d="M460 244 L482 244 A22 22 0 0 0 460 222 Z"/>
    <path d="M460 320 L482 320 A22 22 0 0 1 460 342 Z"/>
  </g>

  <!-- Dimensions -->
  <g stroke="#D88C7A" stroke-width="0.4" fill="#D88C7A" font-size="7" font-family="Inter">
    <line x1="60" y1="60" x2="640" y2="60"/>
    <line x1="60" y1="56" x2="60" y2="66"/><line x1="640" y1="56" x2="640" y2="66"/>
    <text x="350" y="55" text-anchor="middle">38'-0"</text>
    <line x1="40" y1="80" x2="40" y2="406"/>
    <line x1="36" y1="80" x2="44" y2="80"/><line x1="36" y1="406" x2="44" y2="406"/>
    <text x="30" y="243" transform="rotate(-90 30 243)" text-anchor="middle">26'-0"</text>
  </g>

  <g font-size="8" fill="#4F6D7A">
    <text x="40" y="510" font-weight="600" letter-spacing="1.5">DRAWING NOTES</text>
    <text x="40" y="522">A. Primary suite ceiling slopes from 9'-0" to 11'-6" along south wall.</text>
    <text x="40" y="532">B. Bunk room ceiling vaulted with exposed beam — see section A-A on sheet A-2.0.</text>
  </g>

  <text x="690" y="510" text-anchor="end" font-family="Caveat" font-size="14" fill="#D88C7A" opacity="0.8">— just me, ashleigh</text>
</svg>
