<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Inter, sans-serif">
  <defs>
    <pattern id="sectionHatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1A2832" stroke-width="0.6"/>
    </pattern>
    <pattern id="earth" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#BFA98C"/>
      <circle cx="2" cy="2" r="0.5" fill="#8B7355"/>
      <circle cx="4" cy="5" r="0.4" fill="#8B7355"/>
    </pattern>
  </defs>

  <g font-family="Inter" font-size="9" fill="#4F6D7A">
    <text x="40" y="22" font-size="14" fill="#2C4654" font-weight="600" letter-spacing="2">SECTION A–A · LOOKING WEST</text>
    <text x="40" y="36" letter-spacing="1.5">SCALE 1:48  ·  GREAT ROOM VAULTED CEILING + UPPER LEVEL SHOWN</text>
    <text x="680" y="22" text-anchor="end" font-size="10" fill="#D88C7A" letter-spacing="2">SHEET A-3.0</text>
  </g>

  <!-- grade -->
  <line x1="40" y1="400" x2="680" y2="400" stroke="#8B7355" stroke-width="1.2"/>
  <rect x="40" y="400" width="640" height="40" fill="url(#earth)" opacity="0.6"/>

  <!-- foundation (cut) -->
  <rect x="140" y="380" width="440" height="40" fill="url(#sectionHatch)"/>
  <line x1="140" y1="380" x2="580" y2="380" stroke="#1A2832" stroke-width="1.5"/>
  <line x1="140" y1="420" x2="580" y2="420" stroke="#1A2832" stroke-width="1.5"/>

  <!-- main floor slab -->
  <rect x="140" y="372" width="440" height="8" fill="url(#sectionHatch)"/>
  <line x1="140" y1="372" x2="580" y2="372" stroke="#1A2832" stroke-width="1.2"/>

  <!-- exterior walls (cut) -->
  <rect x="140" y="120" width="10" height="252" fill="url(#sectionHatch)"/>
  <rect x="570" y="120" width="10" height="252" fill="url(#sectionHatch)"/>

  <!-- upper floor structure -->
  <rect x="150" y="252" width="420" height="8" fill="url(#sectionHatch)"/>

  <!-- vaulted ceiling line (great room area shown right) -->
  <path d="M380 372 L380 260 L420 260 L420 372" fill="none" stroke="#1A2832" stroke-width="0.7" stroke-dasharray="4,3"/>

  <!-- Roof structure (cut at ridge) -->
  <polygon points="140,120 360,40 580,120 570,128 360,52 150,128" fill="url(#sectionHatch)"/>
  <line x1="140" y1="120" x2="360" y2="40" stroke="#1A2832" stroke-width="1.2"/>
  <line x1="360" y1="40" x2="580" y2="120" stroke="#1A2832" stroke-width="1.2"/>
  <!-- ridge beam -->
  <rect x="354" y="40" width="12" height="14" fill="#8B7355" stroke="#1A2832" stroke-width="0.8"/>

  <!-- ceiling/floor joists indicator -->
  <g stroke="#1A2832" stroke-width="0.3" stroke-dasharray="2,2">
    <line x1="150" y1="256" x2="570" y2="256"/>
  </g>

  <!-- ROOM LABELS / SPACES -->

  <!-- upper level rooms -->
  <text x="200" y="200" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">PRIMARY BATH</text>
  <text x="200" y="214" font-size="7" fill="#4F6D7A" letter-spacing="1">9'-0" ceiling</text>

  <text x="350" y="200" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">HALL / OVERLOOK</text>
  <text x="350" y="214" font-size="7" fill="#4F6D7A" letter-spacing="1">overlook to great room</text>

  <text x="490" y="200" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">PRIMARY</text>
  <text x="490" y="216" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">BEDROOM</text>
  <text x="490" y="230" font-size="7" fill="#4F6D7A" letter-spacing="1">sloped ceiling 9–11'</text>

  <!-- main level -->
  <text x="160" y="310" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">DINING</text>
  <text x="160" y="324" font-size="7" fill="#4F6D7A">9'-0" ceiling</text>

  <text x="260" y="340" font-family="Cormorant Garamond" font-size="14" fill="#2C4654" font-weight="500">GREAT ROOM</text>
  <text x="260" y="354" font-size="7" fill="#4F6D7A" letter-spacing="1">vaulted to 18'-0" at ridge</text>

  <text x="450" y="310" font-family="Cormorant Garamond" font-size="12" fill="#2C4654">KITCHEN</text>
  <text x="450" y="324" font-size="7" fill="#4F6D7A">9'-0" ceiling</text>

  <!-- exposed beams in great room -->
  <g fill="#BFA98C" stroke="#1A2832" stroke-width="0.5">
    <rect x="220" y="130" width="160" height="6"/>
    <rect x="220" y="170" width="160" height="6"/>
    <rect x="220" y="210" width="160" height="6"/>
  </g>
  <text x="385" y="135" font-size="6" fill="#4F6D7A" font-style="italic">exposed beams · 4×8 reclaimed oak</text>

  <!-- crown moldings, baseboards -->
  <g stroke="#1A2832" stroke-width="0.4">
    <line x1="150" y1="248" x2="570" y2="248"/>
    <line x1="150" y1="368" x2="570" y2="368"/>
  </g>

  <!-- windows in section (transparent indicator) -->
  <g fill="#9BBFB1" opacity="0.5" stroke="#FDFCFA" stroke-width="0.8">
    <rect x="150" y="280" width="10" height="60"/>
    <rect x="560" y="280" width="10" height="60"/>
    <rect x="150" y="160" width="10" height="60"/>
    <rect x="560" y="160" width="10" height="60"/>
  </g>

  <!-- staircase indication -->
  <g stroke="#1A2832" stroke-width="0.6" fill="#F4EFE6">
    <path d="M150 372 L150 365 L160 365 L160 358 L170 358 L170 351 L180 351 L180 344 L190 344 L190 337 L200 337 L200 330 L210 330 L210 323 L220 323 L220 316 L230 316 L230 309 L240 309 L240 302 L250 302 L250 295 L260 295 L260 288 L270 288 L270 281 L280 281 L280 274 L290 274 L290 260"/>
  </g>
  <text x="285" y="290" font-family="Cormorant Garamond" font-style="italic" font-size="10" fill="#4F6D7A">stair</text>

  <!-- elevation tags / heights -->
  <g stroke="#D88C7A" stroke-width="0.4" fill="#D88C7A" font-size="6.5" font-family="Inter">
    <line x1="40" y1="40" x2="120" y2="40"/>
    <text x="42" y="36">+28'-6"  RIDGE</text>
    <line x1="40" y1="120" x2="120" y2="120"/>
    <text x="42" y="116">+18'-0"  EAVE</text>
    <line x1="40" y1="256" x2="120" y2="256"/>
    <text x="42" y="252">+9'-0"   FINISH FLOOR 2</text>
    <line x1="40" y1="372" x2="120" y2="372"/>
    <text x="42" y="368">±0'-0"   FINISH FLOOR 1</text>
    <line x1="40" y1="400" x2="120" y2="400"/>
    <text x="42" y="396">-1'-0"   GRADE</text>
  </g>

  <g font-size="8" fill="#4F6D7A">
    <text x="40" y="450" font-weight="600" letter-spacing="1.5">SECTION NOTES</text>
    <text x="40" y="462">Great room is the architectural heart — vaulted to the ridge, three exposed beams visible from below, sea-fog blue ceiling.</text>
    <text x="40" y="472">For the model: cut the upper level floor 7'-0" deep only, leaving the front 4'-0" open as overlook with a 1/4" balsa railing.</text>
  </g>
</svg>
